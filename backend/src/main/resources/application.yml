# SkyTrust无人机共享租赁区块链平台 - 主配置文件
spring:
# SpringDoc OpenAPI 3（无需手动配置路径匹配策略）

  application:
    name: skytrust-platform
    version: 1.0.0

  # 配置文件激活
  profiles:
    active: dev

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 国际化配置
  messages:
    basename: i18n/messages
    encoding: UTF-8

  # 数据源配置（全环境默认值）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/skytrust_dev?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ''
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    enable-sql-session-factory-override: true
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI 3 文档配置（自动集成，无需额外设置）

# 服务器配置
server:
  port: 9090
  servlet:
    context-path: /
    session:
      timeout: 30m
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    connection-timeout: 5000ms

# 日志配置
logging:
  level:
    com.skytrust: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
  file:
    name: logs/skytrust.log
    max-size: 100MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n"

# 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# 自定义配置
skytrust:
  platform:
    name: SkyTrust无人机共享租赁平台
    version: 1.0.0
    copyright: \u00a9 2026 SkyTrust Inc.

  # 文件上传配置
  upload:
    max-size: 100MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx
    path: ${user.home}/skytrust/uploads

  # JWT配置
  jwt:
    secret: skytrust-secret-key-change-in-production
    expiration: 7200
    refresh-expiration: 604800
    header: Authorization
    prefix: Bearer

  # 短信验证码配置
  sms:
    enabled: false
    template-id: SYS_001
    expire-time: 300

  # 区块链配置
  blockchain:
    enabled: false
    type: ethereum
    node-url: http://localhost:8545
    chain-id: 1337
    contract-address: "0x0000000000000000000000000000000000000000"

  # AI服务配置
  ai:
    service-url: http://localhost:5000
    timeout: 30000
    enabled: false

  # 物联网配置
  iot:
    mqtt:
      broker-url: tcp://localhost:1883
      username: skytrust
      password: skytrust123
      client-id: skytrust-server
      qos: 1
      reconnect-interval: 5000

  # 风控配置
  risk:
    max-devices-per-user: 5
    max-rental-hours: 24
    deposit-rate: 0.2

  # 调度算法配置
  scheduling:
    max-distance: 5000
    check-interval: 30000

  # CORS跨域配置
  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false
    max-age: 3600
