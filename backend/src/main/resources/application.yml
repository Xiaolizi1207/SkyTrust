# SkyTrust无人机共享租赁区块链平台 - 主配置文件
# 所有密钥使用 ${ENV_VAR:default} 占位符，实际值从环境变量注入
spring:
  application:
    name: skytrust-platform
    version: 1.0.0

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  messages:
    basename: i18n/messages
    encoding: UTF-8

  # 数据源 — 密钥从环境变量注入
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:skytrust_dev}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    enable-sql-session-factory-override: true
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: ${SERVER_PORT:9090}
  servlet:
    context-path: /
    session:
      timeout: 30m
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    connection-timeout: 5000ms

logging:
  level:
    com.skytrust: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
  file:
    name: logs/skytrust.log
    max-size: 100MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# 自定义配置
skytrust:
  platform:
    name: SkyTrust无人机共享租赁平台
    version: 1.0.0
    copyright: "\u00a9 2026 SkyTrust Inc."

  upload:
    max-size: 100MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx
    path: ${user.home}/skytrust/uploads

  # JWT — 密钥从环境变量注入 (启动时 JwtConfig 将 secret 传给 SecurityUtil)
  jwt:
    secret: ${JWT_SECRET}
    expiration: 7200
    refresh-expiration: 604800
    header: Authorization
    prefix: Bearer

  sms:
    enabled: ${SMS_ENABLED:false}
    template-id: ${SMS_TEMPLATE_ID:SYS_001}
    expire-time: ${SMS_EXPIRE_TIME:300}

  blockchain:
    enabled: ${BLOCKCHAIN_ENABLED:false}
    type: ethereum
    node-url: ${BLOCKCHAIN_NODE_URL:http://localhost:8545}
    chain-id: ${BLOCKCHAIN_CHAIN_ID:1337}
    contract-address: ${BLOCKCHAIN_CONTRACT_ADDR:0x0000000000000000000000000000000000000000}

  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:5000}
    timeout: 30000
    enabled: ${AI_ENABLED:false}

  iot:
    mqtt:
      broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
      username: ${MQTT_USERNAME:skytrust}
      password: ${MQTT_PASSWORD}
      client-id: skytrust-server
      qos: 1
      reconnect-interval: 5000

  risk:
    max-devices-per-user: 5
    max-rental-hours: 24
    deposit-rate: 0.2

  scheduling:
    max-distance: 5000
    check-interval: 30000

  cors:
    allowed-origins: ${CORS_ORIGINS:*}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false
    max-age: 3600
