# SkyTrust无人机共享租赁区块链平台 - 主配置文件
spring:
  autoconfigure:
      exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

  application:
    name: skytrust-platform
    version: 1.0.0

  # 配置文件激活
  profiles:
    active: dev

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 国际化配置
  messages:
    basename: i18n/messages
    encoding: UTF-8

  # 关闭认证
  security:
    basic:
      enabled: false

# 关闭 Swagger 启动，彻底解决空指针
springfox:
  documentation:
    auto-startup: false

# 服务器配置
server:
  port: 9090
  servlet:
    context-path: /api
    session:
      timeout: 30m
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    connection-timeout: 5000ms

# 日志配置
logging:
  level:
    com.skytrust: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
  file:
    name: logs/skytrust.log
    max-size: 100MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n"

# 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# 自定义配置
skytrust:
  # 平台基本信息
  platform:
    name: SkyTrust无人机共享租赁平台
    version: 1.0.0
    copyright: © 2026 SkyTrust Inc.

  # 文件上传配置
  upload:
    max-size: 100MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx
    path: ${user.home}/skytrust/uploads

  # JWT配置
  jwt:
    secret: skytrust-secret-key-change-in-production
    expiration: 7200 # 2小时
    header: Authorization
    prefix: Bearer

  # 短信验证码配置
  sms:
    enabled: false
    template-id: SYS_001
    expire-time: 300 # 5分钟

  # 区块链配置
  blockchain:
    enabled: false
    type: ethereum # ethereum, hyperledger
    node-url: http://localhost:8545
    chain-id: 1337
    contract-address: "0x0000000000000000000000000000000000000000"

  # AI服务配置
  ai:
    service-url: http://localhost:5000
    timeout: 30000
    enabled: false

  # 物联网配置
  iot:
    mqtt:
      broker-url: tcp://localhost:1883
      username: skytrust
      password: skytrust123
      client-id: skytrust-server
      qos: 1
      reconnect-interval: 5000

  # 风控配置
  risk:
    max-devices-per-user: 5
    max-rental-hours: 24
    deposit-rate: 0.2 # 押金比例20%

  # 调度算法配置
  scheduling:
    max-distance: 5000 # 最大调度距离5公里
    check-interval: 30000 # 30秒检查一次

  # CORS跨域配置
  cors:
    allowed-origins: "*" # 允许的来源，多个用逗号分隔，例如 "http://localhost:8080,http://localhost:3000"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false # 是否允许携带凭证（cookie等），如果为true，allowed-origins不能为"*"
    max-age: 3600 # 预检请求缓存时间（秒）


