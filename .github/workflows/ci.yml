name: SkyTrust CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # 后端 — 编译 + 测试
  # ============================================================
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build & Test Backend
        working-directory: backend
        run: mvn clean verify -DskipTests=false
        env:
          JWT_SECRET: ci-test-jwt-secret-not-for-production

  # ============================================================
  # 前端 — 编译 + lint
  # ============================================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ============================================================
  # 合约 — 编译 + 测试
  # ============================================================
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - name: Compile & Test Contracts
        working-directory: contracts
        run: |
          npm ci
          npx hardhat compile
          npx hardhat test

  # ============================================================
  # 安全扫描 — 硬编码密钥检测
  # ============================================================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secrets detection with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Hard fail on high-confidence secrets; warn on others
          fail-shallow: false
